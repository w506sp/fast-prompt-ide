{% extends 'base.html' %}

{% block title %}{% if object %}edit{% else %}new{% endif %} template — fast-prompt-ide{% endblock %}

{% block content %}
<h2>{% if object %}edit prompt template{% else %}new prompt template{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% if object %}save changes{% else %}create template{% endif %}</button>
</form>
<hr>
<p><a href="{% if object %}{% url 'prompt_template_detail' object.pk %}{% else %}{% url 'project_detail' project.pk %}{% endif %}">&larr; cancel</a></p>
{% endblock %}
