{% extends 'base.html' %}

{% block content %}
<h2>{% if object %}edit project{% else %}new project in {{ workspace.name }}{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">save project</button>
    <a href="{% url 'workspace_detail' workspace.pk %}">cancel</a>
</form>
{% endblock %}
