{% extends 'base.html' %}

{% block content %}
<h2>delete workspace: {{ object.name }}</h2>
<p class="error">are you sure you want to delete this workspace? this will also delete all projects within it.</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-danger">yes, delete workspace</button>
    <a href="{% url 'workspace_detail' object.pk %}">no, cancel</a>
</form>
{% endblock %}
