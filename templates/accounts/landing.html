{% extends 'base.html' %}

{% block title %}home{% endblock %}

{% block content %}
    <h1>home</h1>
    <p>welcome to the system.</p>
    {% if not user.is_authenticated %}
        <p><a href="{% url 'login' %}">login</a> or <a href="{% url 'signup' %}">signup</a> to continue.</p>
    {% else %}
        <p>logged in as: <strong>{{ user.username }}</strong></p>
        <p><a href="{% url 'delete_account' %}" class="btn-danger">remove account</a></p>
    {% endif %}
{% endblock %}
