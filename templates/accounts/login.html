{% extends 'base.html' %}

{% block title %}login{% endblock %}

{% block content %}
    <h1>login</h1>
    {% if form.errors %}
        <p class="error">access denied.</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">authenticate</button>
    </form>
    <p>no account? <a href="{% url 'signup' %}">signup</a></p>
{% endblock %}
