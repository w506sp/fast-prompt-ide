{% extends 'base.html' %}

{% block title %}remove account - fast-prompt-ide{% endblock %}

{% block content %}
    <h1>remove account</h1>
    <p class="error">warning: this will permanently delete your developer profile and all associated data.</p>
    <p>are you sure you want to proceed?</p>
    <form method="post">
        {% csrf_token %}
        <div style="margin: 20px 0;">
            <button type="submit" class="btn-danger">confirm termination</button>
            <a href="{% url 'landing' %}" style="margin-left: 20px;">cancel</a>
        </div>
    </form>
{% endblock %}
