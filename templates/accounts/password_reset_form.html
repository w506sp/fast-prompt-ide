{% extends 'base.html' %}

{% block title %}reset password - fast-prompt-ide{% endblock %}

{% block content %}
    <h1>reset password</h1>
    <p>forgot your password? enter your email address below, and we'll email instructions for setting a new one.</p>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            {{ form.as_p }}
        </div>
        <button type="submit">send instructions</button>
    </form>
{% endblock %}
