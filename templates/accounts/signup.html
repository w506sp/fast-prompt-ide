{% extends 'base.html' %}

{% block title %}signup - fast-prompt-ide{% endblock %}

{% block content %}
    <h1>signup</h1>
    <p>create a developer account to start managing your prompts.</p>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            {{ form.as_p }}
        </div>
        <button type="submit">create account</button>
    </form>
    <p>already registered? <a href="{% url 'login' %}">login here</a>.</p>
{% endblock %}
